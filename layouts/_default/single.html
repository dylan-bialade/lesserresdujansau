{{ define "main" }}

<section class="page-hero">
  <div class="container">
    <div class="breadcrumb">
      <a href="/">Accueil</a>
      {{ with .Parent }}
        &nbsp;›&nbsp; <a href="{{ .Permalink }}">{{ .Title }}</a>
      {{ end }}
      &nbsp;›&nbsp; {{ .Title }}
    </div>
    <h1>{{ .Title }}</h1>
    {{ with .Params.description }}<p>{{ . }}</p>{{ end }}
  </div>
</section>

<div class="container">
  <div class="page-content">
    {{ .Content }}
  </div>
</div>

{{ end }}
